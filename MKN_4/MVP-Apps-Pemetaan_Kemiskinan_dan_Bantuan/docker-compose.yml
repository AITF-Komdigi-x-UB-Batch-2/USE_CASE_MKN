
services:
  # --- 1. POSTGRESQL (DATABASE UTAMA) ---
  db:
    image: postgres:15-alpine
    container_name: mkn_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- 2. MINIO (GUDANG FOTO TIPE S3) ---
  minio:
    image: minio/minio
    container_name: mkn_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # --- 3. MOCK AI SERVICE ---
  mock_ai:
    build:
      context: ./jatim-sosial-backend
      dockerfile: Dockerfile
    container_name: mkn_mock_ai
    restart: always
    command: uvicorn mock_ai:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    depends_on:
      - db

  # --- 4. BACKEND API SERVICE ---
  backend:
    build:
      context: ./jatim-sosial-backend
      dockerfile: Dockerfile
    container_name: mkn_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AI_BASE_URL=http://mock_ai:8001
    depends_on:
      - db
      - minio
      - mock_ai

  # --- 5. FRONTEND WEB CLIENT ---
  frontend:
    build:
      context: ./jatim-sosial-frontend
      dockerfile: Dockerfile
    container_name: mkn_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
